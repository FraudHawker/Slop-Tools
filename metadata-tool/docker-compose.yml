services:
  metadata-tool:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
    environment:
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-100}
      - MAX_TOTAL_GB=${MAX_TOTAL_GB:-10}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    restart: unless-stopped
